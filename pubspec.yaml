name: meloday
description: "Meloday · 音乐日记 — AI-powered music diary"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  liquid_glass_widgets:
    git:
      url: https://github.com/sdegenaar/liquid_glass_widgets
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audioplayers: ^6.1.0
  uuid: ^4.5.1
  intl: ^0.19.0
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    - family: LXGW WenKai
      fonts:
        - asset: assets/fonts/LXGWWenKai-Regular.ttf
    - family: ZCOOL KuaiLe
      fonts:
        - asset: assets/fonts/ZCOOLKuaiLe-Regular.ttf
  assets:
    - assets/images/
    - assets/music/
